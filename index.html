<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Poem Generator</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI Poem Generator</h1>
      </header>
      <main>
        <form class="">
          <input
            type="text"
            placeholder="Enter a topic for a poem"
            autofocus
            required
            class="generator"
            id="generator"
          />
          <input type="submit" class="submit-button" />
        </form>
        <div class="poem">'poem displayed here'</div>
      </main>

      <footer>
        This AI project is coded by
        <a
          href="https://github.com/duff-e"
          target="_blank"
          rel="noopner noreferrer"
          >Elise Duffy</a
        >
        and is open sourced on
        <a
          href="https://github.com/duff-e/Poems-Project"
          target="_blank"
          rel="noopner noreferrer"
        >
          Github
        </a>
        and hosted on
        <a
          href="https://mypoemgeneratorai.netlify.app"
          target="_blank"
          rel="noopner noreferrer"
        >
          Netlify
        </a>
      </footer>
    </div>
  </body>
</html>
