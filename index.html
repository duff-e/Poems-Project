<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Poem Generator</title>
  </head>
  <body>
    <header>
      <h1>AI Poem Generator</h1>
    </header>
    <main>
      <form>
        <input
          type="text"
          placeholder="Enter a topic for the poem"
          autofocus
          required
        />
        <input type="submit" />
      </form>
      <div>'poem displayed here'</div>
    </main>
    <footer>
      This AI project is coded by
      <a href="https://github.com/duff-e">Elise Duffy</a> and is open sourced on
      <a href="https://github.com/duff-e/Poems-Project"> Github </a> and hosted
      on <a href="https://mypoemgeneratorai.netlify.app"> Netlify </a>
    </footer>
  </body>
</html>
